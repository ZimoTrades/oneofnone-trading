<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One of None Trading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #060809;
            color: #e8eaed;
            font-family: 'IBM Plex Mono', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; }
        .logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 16px;
        }
        .logo span { color: #00aaff; }
        .sub {
            font-size: 13px;
            letter-spacing: 0.2em;
            color: #4a6070;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><span>//</span> ONE OF NONE TRADING</div>
        <div class="sub">Returning soon</div>
    </div>
</body>
</html>
